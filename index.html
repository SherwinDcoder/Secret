<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Starry HANNA & SHERWIN</title>
    <style>
        body {
            margin: 0;
            background: #000000;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
        }
        canvas {
            display: block;
        }

        /* Interactive "Happy Monthsary" Link */
        .message-link {
            position: absolute;
            bottom: 12%; 
            width: 100%;
            text-align: center;
            text-decoration: none;
            display: block;
            z-index: 10;
        }

        .message-text {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.5rem;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: inline-block;
            cursor: pointer;
            transition: all 0.3s ease;
            
            /* Initial "Pop" and continuous "Glow" */
            animation: popIn 1s cubic-bezier(0.17, 0.89, 0.32, 1.49), 
                       glowPulse 2s infinite ease-in-out;
        }

        /* Hover effect for desktop / Tap feedback for iPhone */
        .message-text:hover {
            transform: scale(1.2);
            color: #fff;
            text-shadow: 0 0 20px #fff, 0 0 30px #ff4d4d;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes glowPulse {
            0%, 100% { text-shadow: 0 0 8px rgba(255,255,255,0.6); }
            50% { text-shadow: 0 0 20px rgba(255,255,255,1), 0 0 30px rgba(255,255,255,0.4); }
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<a href="message.html" class="message-link" target="_blank">
    <div class="message-text">Happy Monthsary Baby 😘</div>
</a>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let width, height;
let hannaStars = [];
let bgStars = [];
let shootingStars = [];
let fireworks = [];
let touchParticles = [];

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    generateStars();
}
window.addEventListener("resize", resize);

function generateStars() {
    const offCanvas = document.createElement("canvas");
    const offCtx = offCanvas.getContext("2d");
    offCanvas.width = width;
    offCanvas.height = height;

    const centerX = width / 2;
    const centerY = height * 0.42; 
    const fontSize = Math.min(width / 7, 85);

    offCtx.fillStyle = "white";
    offCtx.textAlign = "center";
    offCtx.textBaseline = "middle";
    
    offCtx.font = `bold ${fontSize}px Arial`;
    offCtx.fillText("HANNA", centerX, centerY - fontSize * 1.4);

    offCtx.font = `bold ${fontSize * 1.2}px Arial`;
    offCtx.fillText("❤", centerX, centerY);

    offCtx.font = `bold ${fontSize}px Arial`;
    offCtx.fillText("SHERWIN", centerX, centerY + fontSize * 1.4);

    const data = offCtx.getImageData(0, 0, width, height);
    hannaStars = [];
    const gap = 6; 

    for (let y = 0; y < height; y += gap) {
        for (let x = 0; x < width; x += gap) {
            const i = (y * width + x) * 4;
            if (data.data[i + 3] > 128) {
                hannaStars.push({ x, y, size: 1.1 });
            }
        }
    }

    bgStars = [];
    for (let i = 0; i < 150; i++) {
        bgStars.push({
            x: Math.random() * width,
            y: Math.random() * height,
            r: Math.random() * 1.1,
            phase: Math.random() * Math.PI * 2,
            speed: 0.01 + Math.random() * 0.02
        });
    }
}

// TOUCH FOR IPHONE
canvas.addEventListener("touchstart", (e) => {
    handleTouch(e.touches[0].clientX, e.touches[0].clientY);
});

canvas.addEventListener("touchmove", (e) => {
    handleTouch(e.touches[0].clientX, e.touches[0].clientY);
    e.preventDefault();
}, { passive: false });

let lastTap = 0;
canvas.addEventListener('touchend', function (e) {
    let currentTime = new Date().getTime();
    let tapLength = currentTime - lastTap;
    if (tapLength < 300 && tapLength > 0) {
        spawnFirework(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
    }
    lastTap = currentTime;
});

function handleTouch(x, y) {
    for (let i = 0; i < 3; i++) {
        touchParticles.push({
            x, y,
            vx: (Math.random() - 0.5) * 2,
            vy: (Math.random() - 0.5) * 2,
            life: 1.0,
            size: Math.random() * 2 + 1
        });
    }
}

function spawnFirework(x = Math.random() * width, y = Math.random() * height * 0.5) {
    const particles = [];
    const color = Math.random() > 0.5 ? "#FFD700" : "#FFFFFF";
    for (let i = 0; i < 25; i++) {
        const angle = (Math.PI * 2 * i) / 25;
        const speed = Math.random() * 3 + 1;
        particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 1.0, color });
    }
    fireworks.push(particles);
}

function spawnShootingStar() {
    shootingStars.push({
        x: Math.random() * width,
        y: Math.random() * height * 0.3,
        vx: -5, vy: 3, life: 1.0
    });
}

function draw() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
    ctx.fillRect(0, 0, width, height);

    bgStars.forEach(s => {
        s.phase += s.speed;
        ctx.globalAlpha = 0.3 + (Math.sin(s.phase) + 1) / 4;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = "white";
        ctx.fill();
    });

    ctx.globalAlpha = 1;
    for (let i = touchParticles.length - 1; i >= 0; i--) {
        let p = touchParticles[i];
        p.x += p.vx; p.y += p.vy; p.life -= 0.02;
        ctx.fillStyle = `rgba(255, 255, 255, ${p.life})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        if (p.life <= 0) touchParticles.splice(i, 1);
    }

    ctx.fillStyle = "white";
    hannaStars.forEach(s => {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();
    });

    if (Math.random() < 0.01) spawnShootingStar();
    for (let i = shootingStars.length - 1; i >= 0; i--) {
        let s = shootingStars[i];
        s.x += s.vx; s.y += s.vy; s.life -= 0.015;
        ctx.strokeStyle = `rgba(255, 255, 255, ${s.life})`;
        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        ctx.lineTo(s.x + 15, s.y - 9);
        ctx.stroke();
        if (s.life <= 0) shootingStars.splice(i, 1);
    }

    if (Math.random() < 0.015) spawnFirework();
    for (let i = fireworks.length - 1; i >= 0; i--) {
        let particles = fireworks[i];
        particles.forEach(p => {
            p.x += p.vx; p.y += p.vy; p.vy += 0.03; p.life -= 0.015;
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2);
            ctx.fill();
        });
        fireworks[i] = particles.filter(p => p.life > 0);
        if (fireworks[i].length === 0) fireworks.splice(i, 1);
    }
}

function animate() {
    draw();
    requestAnimationFrame(animate);
}

resize();
animate();
</script>
</body>
</html>
